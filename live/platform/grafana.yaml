grafana:
  persistence:
    enabled: false

  ingress:
    enabled: true
    ingressClassName: nginx
    hosts:
      - grafana.home.ryougi.ca
      - grafana.ryougi.ca
    path: /
    pathType: Prefix

  datasources:
    datasources.yaml:
      apiVersion: 1
      datasources:
        - name: monitoring
          type: prometheus
          access: proxy
          url: http://platform-grafana-prometheus-server.monitoring.svc:80
          isDefault: true
          editable: false
        - name: storage-sentinel
          type: prometheus
          access: proxy
          url: http://platform-storage-sentinel-prometheus-server.monitoring.svc:80
          isDefault: false
          editable: false

prometheus:
  server:
    retention: 15d
    persistentVolume:
      enabled: true
      existingClaim: prometheus-data
      accessModes:
        - ReadWriteOnce
      size: 50Gi
      storageClass: ""
      volumeName: prometheus-platform-pv

    ingress:
      enabled: true
      ingressClassName: nginx
      hosts:
        - prometheus.home.ryougi.ca
        - prometheus.ryougi.ca
      path: /
      pathType: Prefix

  alertmanager:
    enabled: true
    persistence:
      enabled: false
